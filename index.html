---
layout: default
---

<div class="jumbotron">
  <div class="container">
    <div class="row">
      <div class="col-sm-4">
        <h1>Hi, I'm Alex.</h1>
        <h4>{{ site.description }}</h4>
      </div>
      <div class="col-sm-8">
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="posts">
    {% for post in site.posts %}
      <article class="post">

        <h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>

        <div class="entry">
          <h4>{{ post.excerpt }}</h4>
        </div>

        <div class="post-footer">
          <a href="{{ site.baseurl }}{{ post.url }}" class="post-footer-text">Read More</a>
          <a href="https://www.github.com/atomar94/{{ post.github }}" class="post-footer-text">View on Github</a>
          <p class="post-footer-text"> {{ post.date | date: "%B %e, %Y" }}</p>
        </div>
      </article>
    {% endfor %}
  </div>
</div>
