---
layout: default
---
<section class="jumbotron">
  <div class="container">
    <h1 class="col-sm-8"> Hello World </h1>
    <h1 class="col-sm-4"> Smaller column </h1>
  </div>
</section>
<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h3><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h3>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <div class="post-footer">
        <div class="container">
          <a href="{{ site.baseurl }}{{ post.url }}" class="post-footer-text">Read More</a>
          <a href="https://www.github.com{{ post.github }}" class="post-footer-text">Github</a>
        </div>
      </div>

    </article>
  {% endfor %}
</div>
