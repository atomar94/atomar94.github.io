---
layout: default
---
<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <div class="post-footer">
        <div class="container">
          <a href="{{ site.baseurl }}{{ post.url }}" class="post-footer-text">Read More</a>
          <a href="https://www.github.com{{ post.github }}" class="post-footer-text">Github</a>
        </div>
      </div>

    </article>
  {% endfor %}
</div>
