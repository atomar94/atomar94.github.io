---
layout: default
---
<section class="jumbotron">
  <div class="container">
    <h1 class="col-sm=12"> Hello World </h1>
  </div>
</section>
<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h3><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h3>

      <div class="entry">
        {{ post.excerpt }}
      </div>
      <div class="post-footer">
        <div class="container">
          <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
          <a href="https://github.com/atomar94/Reddit_Bot" class="read-more">Github</a>
      </div>
    </article>
  {% endfor %}
</div>
