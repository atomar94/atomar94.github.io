<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/styles/site.css"/>
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="container nav-buffer-masthead">
      <nav class="navbar navbar-fixed-top navbar-default">
        <a class="navbar-brand" href="#">Alex Omar</a>
        <ul class="nav navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/projects">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/experiences">Experience</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/">Blog</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/about">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/content/AlexOmarResume.pdf">Resume</a>
          </li>
        </ul>
        <p class="float-xs-right">
          {% include svg-icons.html %}
        </ul>
      </nav>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
