---
layout: default
---

<article class="post">
  <div class="container">
    <h1 class="col-sm-11">{{ page.title }}</h1>
    <img class="col-sm-1" src="http://image.flaticon.com/icons/svg/23/23957.svg"/>
  </div>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

</article>
