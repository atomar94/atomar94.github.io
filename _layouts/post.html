---
layout: default
---

<article class="post">
  <div class="container">
    <div class="row">
      <h1 class="col-sm-10">{{ page.title }}</h1>
      <img class="col-sm-2" src="http://cdn.mysitemyway.com/icons-watermarks/flat-rounded-square-white-on-black/foundation/foundation_social-github/foundation_social-github_flat-rounded-square-white-on-black_512x512.png"/>
    <button type="button" class="btn btn-info">Button</button/>
  </div>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

</article>
