---
layout: experience
---
<div class="experience">
{% for post in site.experiences %}
  <article class="post">
    <div class="container">

      <div class="col-sm-3">
        <img src="example.com/image.png"/>
      </div>

      <div class="col-sm-9">
        <h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>

        <div class="entry">
          <h4>{{ post.excerpt }}</h4>
        </div>

        <div class="post-footer">
          <a href="{{ site.baseurl }}{{ post.url }}" class="post-footer-text">Read More</a>
          <a href="https://www.github.com/atomar94/{{ post.github }}" class="post-footer-text">View on Github</a>
          <p class="post-footer-text"> {{ post.date | date: "%B %e, %Y" }}</p>
        </div>
      </div>

    </div>
  </article>
{% endfor %}
</div>
